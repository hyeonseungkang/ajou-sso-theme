name: Publish

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  build:

    runs-on: ubuntu-latest

    concurrency:
      group: my-global-job
      cancel-in-progress: true

    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Create tampermonkey script
        run: |
          npm start

      - name: Create zip file with entire repo
        run: |
          rm -rf dist/latest.zip
          zip -r dist/latest.zip ./ -x .git/\*

      - name: Commit to deploy branch
        run: |
          export GIT_COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          git config --global user.email "GitHub Actions"
          git config --global user.name "actions@github.com"
          git rm -r --cached .
          git add .
          git commit -m "$GIT_COMMIT_MESSAGE" || echo "Nothing to commit, repository is up to date."

      - name: Push changes to deploy branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin deploy || echo "Nothing to push, repository is up to date."

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master
          branch: deploy
          title: "Auto PR: deploy to master"
          body: "This pull request was created automatically to merge changes from deploy to master."
          draft: false
